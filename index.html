<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片画廊</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background-color: #0a0a0a;
      color: #fff;
      font-family: 'Georgia', serif;
      min-height: 100vh;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    
    h1 {
      text-align: center;
      font-size: 3rem;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #c9a96e, #f5e1a8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 40px;
      font-size: 1rem;
    }
    
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    
    .gallery-item {
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      position: relative;
    }
    
    .gallery-item:hover {
      transform: scale(1.03);
      box-shadow: 0 10px 30px rgba(201, 169, 110, 0.3);
    }
    
    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }
    
    .lightbox.active {
      display: flex;
    }
    
    .lightbox img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
      border-radius: 8px;
    }
    
    .close-btn {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 2rem;
      color: #fff;
      cursor: pointer;
      transition: color 0.3s;
    }
    
    .close-btn:hover {
      color: #c9a96e;
    }
    
    @media (max-width: 768px) {
      h1 { font-size: 2rem; }
      .gallery { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>图片画廊</h1>
    <p class="subtitle">点击图片可放大查看</p>
    
    <div class="gallery">
      <div class="gallery-item" onclick="openLightbox('1.png')">
        <img src="1.png" alt="图片 1" loading="lazy">
      </div>
      <div class="gallery-item" onclick="openLightbox('2.png')">
        <img src="2.png" alt="图片 2" loading="lazy">
      </div>
      <div class="gallery-item" onclick="openLightbox('3.png')">
        <img src="3.png" alt="图片 3" loading="lazy">
      </div>
      <div class="gallery-item" onclick="openLightbox('4.png')">
        <img src="4.png" alt="图片 4" loading="lazy">
      </div>
      <div class="gallery-item" onclick="openLightbox('5.png')">
        <img src="5.png" alt="图片 5" loading="lazy">
      </div>
      <div class="gallery-item" onclick="openLightbox('6.png')">
        <img src="6.png" alt="图片 6" loading="lazy">
      </div>
      <div class="gallery-item" onclick="openLightbox('7.png')">
        <img src="7.png" alt="图片 7" loading="lazy">
      </div>
    </div>
  </div>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <span class="close-btn">&times;</span>
    <img id="lightbox-img" src="" alt="大图预览">
  </div>

  <script>
    function openLightbox(src) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('active');
    }
    
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }
    
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>
</body>
</html>
